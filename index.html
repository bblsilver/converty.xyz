<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Converter</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="main-card">
        <h1>Image Converter</h1>
        <p class="subtitle">Convert your images instantly</p>

        <!-- Unified Split Button Bar -->
        <div class="split-button-container">
            <!-- Left Side: Choose Files -->
            <button class="main-btn" onclick="document.getElementById('imageInput').click()">
                Choose Files
            </button>
            
            <!-- Right Side: The Arrow Trigger -->
            <div class="arrow-trigger" id="arrowTrigger">
                <div class="arrow-icon">▼</div>
                
                <!-- The Dropdown Menu (Hidden by default) -->
                <div class="dropdown-options" id="dropdownOptions">
                    <div class="option-item" onclick="setFormat('to-jpg')">JPG</div>
                    <div class="option-item" onclick="setFormat('to-png')">PNG</div>
                    <div class="option-item" onclick="setFormat('to-webp')">WebP</div>
                    <div class="option-item" onclick="setFormat('to-gif')">GIF</div>
                    <div class="option-item" onclick="setFormat('to-bmp')">BMP</div>
                </div>
            </div>
        </div>

        <!-- Hidden File Input -->
        <input type="file" id="imageInput" accept="image/*" hidden>
        
        <!-- Status Text -->
        <div id="statusText" class="status-text">Select a format from the arrow</div>

        <!-- Preview & Actions -->
        <div id="previewContainer" class="preview-container" style="display:none;">
            <img id="imagePreview" src="" alt="Preview">
        </div>

        <button id="convertBtn" class="action-btn" onclick="convertImage()" style="display:none;">
            Convert Now
        </button>

        <a id="downloadLink" class="download-btn" style="display:none;">Download Image</a>
    </div>
    <script src="./script.js"></script>
</body>
</html>
