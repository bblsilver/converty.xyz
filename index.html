<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Converter</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="main-card">
        <h1>Image Converter</h1>
        <p class="subtitle">Convert your images instantly</p>

        <!-- Split Button Container -->
        <div class="split-button-group">
            <!-- The Red Pastel Button -->
            <button class="choose-btn" onclick="document.getElementById('imageInput').click()">
                Choose Files
            </button>
            
            <!-- The Dropdown Arrow & Menu -->
            <div class="dropdown-trigger-wrapper">
                <div class="dropdown-arrow" onclick="toggleDropdown()">▼</div>
                <div class="dropdown-menu" id="conversionMenu">
                    <div class="dropdown-item" onclick="selectFormat('to-jpg')">Convert to JPG</div>
                    <div class="dropdown-item" onclick="selectFormat('to-png')">Convert to PNG</div>
                    <div class="dropdown-item" onclick="selectFormat('to-webp')">Convert to WebP</div>
                    <div class="dropdown-item" onclick="selectFormat('to-gif')">Convert to GIF</div>
                    <div class="dropdown-item" onclick="selectFormat('to-bmp')">Convert to BMP</div>
                </div>
            </div>
        </div>

        <!-- Hidden Input -->
        <input type="file" id="imageInput" accept="image/*" hidden>
        
        <!-- Display Selected Format -->
        <div id="fileInfo" class="file-info">Select a format from the arrow</div>

        <!-- Preview & Actions -->
        <div id="previewContainer" class="preview-container" style="display:none;">
            <img id="imagePreview" src="" alt="Preview">
        </div>

        <button id="convertBtn" class="action-btn" onclick="convertImage()" style="display:none;">
            Convert Now
        </button>

        <a id="downloadLink" class="download-btn" style="display:none;">Download Image</a>
    </div>
    <script src="./script.js"></script>
</body>
</html>
