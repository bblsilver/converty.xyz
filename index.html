<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Converter</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main-card">
        <h1>Image Converter</h1>
        <p class="subtitle">Convert your images instantly</p>

        <!-- The Dropdown for Conversion Options -->
        <div class="dropdown-container">
            <select id="conversionType">
                <option value="" disabled selected>Select Conversion Type</option>
                <option value="to-jpg">Convert to JPG</option>
                <option value="to-png">Convert to PNG</option>
                <option value="to-webp">Convert to WebP</option>
                <option value="to-gif">Convert to GIF</option>
                <option value="to-bmp">Convert to BMP</option>
            </select>
        </div>

        <!-- The Pastel Red Choose Files Button -->
        <button class="choose-btn" onclick="document.getElementById('imageInput').click()">
            Choose Files
        </button>
        <input type="file" id="imageInput" accept="image/*" hidden>

        <!-- File Name Display -->
        <div id="fileInfo" class="file-info"></div>

        <!-- Preview Area -->
        <div id="previewContainer" class="preview-container" style="display:none;">
            <img id="imagePreview" src="" alt="Preview">
        </div>

        <!-- Action Button -->
        <button id="convertBtn" class="action-btn" onclick="convertImage()" style="display:none;">
            Convert Now
        </button>

        <!-- Download Link -->
        <a id="downloadLink" class="download-btn" style="display:none;">Download Image</a>
    </div>

    <script src="script.js"></script>
</body>
</html>
